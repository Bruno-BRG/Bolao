name: Sync World Cup

on:
  schedule:
    # A cada 5 min durante a Copa (ajuste ou desative fora do torneio).
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-worldcup
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Vercel sync endpoint
        env:
          BOLAO_URL: ${{ secrets.BOLAO_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BOLAO_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: configure BOLAO_URL and CRON_SECRET em GitHub Secrets."
            exit 0
          fi
          curl -fsS -X POST "${BOLAO_URL%/}/api/admin/sync-worldcup" \
            -H "Authorization: Bearer ${CRON_SECRET}"
